<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>戰鎚40K 帝皇與泰拉發展史</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Noto+Sans+TC:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#0b0f1a;
  --secondary:#1c2541;
  --accent:#e63946;
  --light:#f1faee;
  --gold:#d4af37;
}

* {box-sizing:border-box;}

body {
  margin:0;
  font-family:'Noto Sans TC', sans-serif;
  background:var(--primary);
  color:var(--light);
}

h1,h2,h3 { font-family:'Orbitron', sans-serif; }

section { padding:80px 20px; max-width:1100px; margin:auto; }

.hero {
  height:100vh;
  background:url('https://images.unsplash.com/photo-1520975698519-59b2d46a6a5f') center/cover no-repeat;
  display:flex; justify-content:center; align-items:center; text-align:center; position:relative;
}
.hero::after { content:""; position:absolute; inset:0; background:rgba(0,0,0,0.6);} 
.hero-content { position:relative; z-index:2; }

.hero h1 { font-size:3.5rem; }

.cta-btn {
  padding:15px 40px; background:var(--accent); border:none; color:white;
  font-size:1.2rem; cursor:pointer; border-radius:8px;
  box-shadow:0 0 15px rgba(230,57,70,0.6);
}

.timeline { position:relative; }
.timeline::before { content:""; position:absolute; left:50%; width:3px; height:100%; background:var(--gold);} 

.timeline-item {
  width:50%; padding:20px; position:relative; cursor:pointer;
}
.timeline-item.left { left:0; text-align:right; }
.timeline-item.right { left:50%; }

.timeline-item::before {
  content:""; position:absolute; top:20px; width:15px; height:15px;
  background:var(--accent); border-radius:50%;
}
.timeline-item.left::before { right:-8px; }
.timeline-item.right::before { left:-8px; }

/* 圖片預覽 */
.preview {
  position:fixed;
  right:30px;
  bottom:30px;
  width:300px;
  height:200px;
  background-size:cover;
  background-position:center;
  border:2px solid var(--gold);
  display:none;
  z-index:999;
}

.fade { opacity:0; transform:translateY(30px); transition:0.8s; }
.fade.show { opacity:1; transform:translateY(0); }

.modal { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; }
.modal-content { background:var(--secondary); padding:30px; border-radius:10px; }

footer { background:var(--secondary); text-align:center; padding:30px; }
iframe { width:100%; height:400px; border:0; }
</style>
</head>

<body>

<div class="preview" id="preview"></div>

<section class="hero">
  <div class="hero-content">
    <h1>為了帝皇，見證人類最黑暗的榮光</h1>
    <button class="cta-btn" onclick="openModal()">立即報名</button>
  </div>
</section>

<section class="fade">
  <h2>活動簡介</h2>
  <p>
    從泰拉統一、大遠征到荷魯斯叛亂，帶你完整了解戰鎚40K最關鍵歷史。
  </p>
</section>

<section class="fade">
  <h2>活動流程（2025/04/15）</h2>
  <div class="timeline">
    <div class="timeline-item left" data-img="https://images.unsplash.com/photo-1542751371-adc38448a05e"><h3>10:00 開場</h3><p>世界觀導覽</p></div>
    <div class="timeline-item right" data-img="https://images.unsplash.com/photo-1526378722370-3b0f0b3fbb42"><h3>11:00 帝皇崛起</h3><p>統一戰爭</p></div>
    <div class="timeline-item left" data-img="https://images.unsplash.com/photo-1504384308090-c894fdcc538d"><h3>13:00 大遠征</h3><p>軍團與擴張</p></div>
    <div class="timeline-item right" data-img="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"><h3>15:00 荷魯斯叛亂</h3><p>內戰與終局</p></div>
  </div>
</section>

<section class="fade">
  <h2>活動地點</h2>
  <iframe src="https://maps.google.com/maps?q=Washington%20DC&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</section>

<footer>
  <p>主辦單位：戰鎚文化推廣協會</p>
</footer>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>報名表</h3>
    <input placeholder="姓名">
    <input placeholder="Email">
    <button class="cta-btn" onclick="closeModal()">送出</button>
  </div>
</div>

<script>
const fades = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
  fades.forEach(el => {
    if(el.getBoundingClientRect().top < window.innerHeight-100){
      el.classList.add('show');
    }
  });
});

function openModal(){ document.getElementById('modal').style.display='flex'; }
function closeModal(){ document.getElementById('modal').style.display='none'; }

// hover 圖片效果
const preview = document.getElementById('preview');
document.querySelectorAll('.timeline-item').forEach(item => {
  item.addEventListener('mouseenter', () => {
    preview.style.display='block';
    preview.style.backgroundImage = `url(${item.dataset.img})`;
  });
  item.addEventListener('mouseleave', () => {
    preview.style.display='none';
  });
});
</script>

</body>
</html>
